{% extends "layout.html" %}
{% block content %}
    <div class="gap-3 p-10 flex justify-center flex-col items-center flex-wrap">
        <div class="text-center">
            <h1 class=" text-3xl font-bold text-red-400">Are you sure?</h1>
        </div>
        <form method="POST" class=" text-left">
            {% csrf_token %}
            <p class="text-md break-words text-tertiary-dark dark:text-tertiary-light">{{ post.body }}</p>
            <p class="text-md mb-4 text-[#3b4246]">{{ post.date }} | {{ post.time }}</p>
            <div class="flex justify-between px-3">
                <button type="submit" class="px-3 py-1 font-bold rounded-lg bg-[#ef6868] hover:bg-[#f23838] text-white">Delete</button>
                <a href="{% url 'yourPosts' %}" class="text-[#68c2ef] font-semibold">Cancel</a>
            </div>
        </form>
    </div>
{% endblock content %}
